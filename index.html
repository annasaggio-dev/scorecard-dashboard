<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Africa Orders Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface2: #f0f1f4;
      --border: #e2e4ea;
      --accent: #00a082;
      --accent2: #006b57;
      --green: #00a082;
      --red: #e53935;
      --yellow: #ffc244;
      --orange: #f97316;
      --text: #1a1a2e;
      --muted: #6b7280;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; padding-bottom: 40px; }

    /* ── Progress bar ── */
    .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); transition: width .3s; z-index: 300; }

    /* ── Header ── */
    .header { background: var(--accent2); color: #fff; border-bottom: none; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 34px; height: 34px; background: var(--yellow); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; color: var(--accent2); }
    .header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,.7); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .refresh-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: rgba(255,255,255,.8); display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--yellow); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .btn:hover { opacity: .85; }
    .btn-sm { padding: 5px 10px; }
    .btn-ghost { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); color: #fff; }
    .header .btn-ghost:hover { background: rgba(255,255,255,.25); }

    /* ── Filter bar ── */
    .filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }

    /* Multi-select dropdown */
    .multi-select { position: relative; }
    .ms-trigger { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px; min-width: 160px; }
    .ms-trigger:hover { border-color: var(--accent); }
    .ms-trigger::after { content: ''; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--muted); margin-left: auto; }
    .ms-dropdown { position: absolute; top: calc(100% + 4px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px; min-width: 200px; z-index: 150; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .ms-dropdown.open { display: block; }
    .ms-option { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
    .ms-option:hover { background: var(--surface2); }
    .ms-option input { accent-color: var(--accent); }
    .ms-option.all-opt { border-bottom: 1px solid var(--border); margin-bottom: 4px; padding-bottom: 10px; font-weight: 600; }

    /* Date range pills */
    .range-pills { display: flex; gap: 4px; }
    .range-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--muted); transition: all .15s; }
    .range-pill:hover { color: var(--text); border-color: var(--accent); }
    .range-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* filter-bar button override for light mode */
    .filter-bar .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .filter-bar .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 1600px; margin: 0 auto; padding: 20px 24px; }

    /* ── KPI Cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: box-shadow .15s, border-color .15s; position: relative; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .kpi-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(0,160,130,.08); }
    .kpi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .kpi-partial { background: rgba(255,194,68,.2); color: #b8860b; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .kpi-value-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .kpi-value { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
    .kpi-deltas { display: flex; gap: 8px; flex-wrap: wrap; }
    .kpi-delta { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; display: inline-flex; align-items: center; gap: 3px; }
    .kpi-delta.up { background: rgba(0,160,130,.1); color: var(--green); }
    .kpi-delta.down { background: rgba(229,57,53,.1); color: var(--red); }
    .kpi-delta.flat { background: rgba(107,114,128,.1); color: var(--muted); }
    .kpi-streak { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .kpi-sparkline { margin-top: 8px; }
    .kpi-sparkline svg { width: 100%; height: 32px; }
    .kpi-best-worst { font-size: 10px; color: var(--muted); margin-top: 6px; display: flex; gap: 12px; }
    .bw-best { color: var(--green); }
    .bw-worst { color: var(--red); }

    /* ── Charts ── */
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; }
    .chart-summary { font-size: 11px; color: var(--muted); display: flex; gap: 14px; }
    .chart-summary .best { color: var(--green); }
    .chart-summary .worst { color: var(--red); }
    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap.tall { height: 320px; }

    /* ── Sections ── */
    .section-title { font-size: 15px; font-weight: 700; margin: 32px 0 14px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); color: var(--text); }

    /* ── Country Tables (2 per row) ── */
    .country-tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .country-table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .country-table-card .card-header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .country-table-card .card-header .card-title { font-size: 13px; font-weight: 700; color: var(--accent2); }
    .country-table-card table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .country-table-card th { padding: 7px 10px; text-align: right; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; background: var(--surface2); }
    .country-table-card th:first-child { text-align: left; }
    .country-table-card td { padding: 6px 10px; border-top: 1px solid var(--border); text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .country-table-card td:first-child { text-align: left; }
    .country-table-card tr:hover td { background: rgba(0,160,130,.04); }
    .delta-up { color: var(--green); font-weight: 600; }
    .delta-down { color: var(--red); font-weight: 600; }
    .delta-flat { color: var(--muted); }

    @media(max-width:900px) { .country-tables-grid { grid-template-columns: 1fr; } }
    @media(max-width:600px) { .chart-grid { grid-template-columns: 1fr; } .chart-wrap { height: 200px; } .chart-wrap.tall { height: 260px; } .kpi-grid { grid-template-columns: 1fr 1fr; } }
    @media(max-width:400px) { .kpi-grid { grid-template-columns: 1fr; } }

    /* ── Table ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 11px; color: var(--text); font-size: 13px; width: 200px; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface2); }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { color: var(--text); }
    th .sort-icon { opacity: .4; margin-left: 3px; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    td { padding: 9px 14px; border-top: 1px solid var(--border); white-space: nowrap; }
    tr:hover td { background: rgba(0,160,130,.03); }
    .num { font-variant-numeric: tabular-nums; text-align: right; }
    .pagination { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .page-btns { display: flex; gap: 4px; }
    .page-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: 11px; }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-btn.current { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Status bar ── */
    .statusbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 6px 24px; font-size: 11px; color: var(--muted); display: flex; align-items: center; justify-content: space-between; z-index: 100; }

    /* ── Loading / Error ── */
    .center-msg { text-align: center; padding: 80px 20px; color: var(--muted); }
    .center-msg h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .center-msg p { font-size: 14px; max-width: 400px; margin: 0 auto 20px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chip ── */
    .chip { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .chip-green { background: rgba(0,160,130,.1); color: var(--green); }
    .chip-red { background: rgba(229,57,53,.1); color: var(--red); }
  </style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0%"></div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">G</div>
    <div>
      <h1 id="dashTitle">Africa Weekly Orders Dashboard</h1>
      <div class="header-sub" id="dashSubtitle">Loading...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-badge"><span class="dot"></span><span id="nextRefreshLabel">Refreshing in 60s</span></div>
    <button class="btn btn-ghost btn-sm" onclick="loadData()">Refresh Now</button>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Country</span>
    <div class="multi-select" id="countryFilter">
      <div class="ms-trigger" id="countryTrigger" onclick="toggleDropdown()">All Countries</div>
      <div class="ms-dropdown" id="countryDropdown"></div>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-label">Granularity</span>
    <div class="range-pills" id="granPills">
      <div class="range-pill" data-gran="day" onclick="setGranularity('day')">Day</div>
      <div class="range-pill active" data-gran="week" onclick="setGranularity('week')">Week</div>
      <div class="range-pill" data-gran="month" onclick="setGranularity('month')">Month</div>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-label">Range</span>
    <div class="range-pills" id="rangePills">
      <div class="range-pill" data-periods="4" onclick="setRange(4)">4</div>
      <div class="range-pill active" data-periods="13" onclick="setRange(13)">13</div>
      <div class="range-pill" data-periods="26" onclick="setRange(26)">26</div>
      <div class="range-pill" data-periods="52" onclick="setRange(52)">52</div>
      <div class="range-pill" data-periods="0" onclick="setRange(0)">All</div>
    </div>
  </div>
  <div style="margin-left:auto">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">Download CSV</button>
  </div>
</div>

<!-- Main content -->
<div class="container">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="chart-grid" id="chartGrid"></div>

  <!-- YoY Comparison Charts -->
  <div class="section-title" id="yoySectionTitle">Year-over-Year Comparison (excl. On-Demand)</div>
  <div class="chart-grid" id="yoyChartGrid"></div>

  <!-- Country Tables -->
  <div class="section-title" id="countryTablesTitle">Country Breakdown</div>
  <div class="country-tables-grid" id="countryTablesGrid"></div>

  <!-- Data table -->
  <div class="card" id="tableCard" style="display:none">
    <div class="card-header">
      <span class="card-title" id="tableTitle">Data</span>
      <input class="search-input" id="searchInput" placeholder="Search..." oninput="filterTable()" />
    </div>
    <div class="table-wrap">
      <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
    </div>
    <div class="pagination"><span id="paginationInfo"></span><div class="page-btns" id="pageBtns"></div></div>
  </div>

  <div id="stateMsg" class="center-msg">
    <div class="spinner"></div>
    <h2>Loading data...</h2>
    <p>Connecting to Google Sheets</p>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar"><span id="statusLeft"></span><span id="statusRight"></span></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS & COUNTRY MAP
// ═══════════════════════════════════════════════════════════════
const COUNTRY_NAMES = {
  CI: "Cote d'Ivoire", KE: 'Kenya', MA: 'Morocco',
  NG: 'Nigeria', TN: 'Tunisia', UG: 'Uganda',
};
const CHART_COLORS = {
  orders:   { line: '#00a082', fill: 'rgba(0,160,130,.08)' },
  nc:       { line: '#006b57', fill: 'rgba(0,107,87,.08)' },
  ncp:      { line: '#ffc244', fill: 'rgba(255,194,68,.1)' },
  prime:    { line: '#7c3aed', fill: 'rgba(124,58,237,.08)' },
  ondemand: { line: '#6b7280', fill: 'rgba(107,114,128,.08)' },
  rolling:  '#e53935',
};
const YOY_COLORS = [
  '#00a082', '#006b57', '#ffc244', '#e53935', '#6b7280', '#0ea5e9', '#d946ef', '#84cc16',
];
const PAGE_SIZE = 50;
const GRAN_LABELS = { day: 'Daily', week: 'Weekly', month: 'Monthly' };

// ═══════════════════════════════════════════════════════════════
//  METRICS UTILITY FUNCTIONS  (lib/metrics equivalent)
// ═══════════════════════════════════════════════════════════════

/**
 * Week-over-Week percentage change.
 * @param {number} current
 * @param {number} previous
 * @returns {number|null} percentage change, null if not computable
 */
function calcWoW(current, previous) {
  if (previous == null || isNaN(current) || isNaN(previous) || previous === 0) return null;
  return ((current - previous) / Math.abs(previous)) * 100;
}

/**
 * Year-over-Year percentage change.
 * For weekly: matches by ISO week number.
 * For monthly: matches by month number.
 * For daily: matches by same weekday of same ISO week in prior year.
 * @param {string} periodDate - date string YYYY-MM-DD
 * @param {number} currentVal
 * @param {Map<string, number>} periodMap - keyed by YYYY-MM-DD
 * @returns {{pct: number|null, priorVal: number|null}}
 */
function calcYoY(periodDate, currentVal, periodMap) {
  const d = new Date(periodDate + 'T00:00:00');
  if (activeGranularity === 'month') {
    const month = d.getMonth();
    const priorYear = d.getFullYear() - 1;
    for (const [pk, val] of periodMap) {
      const pd = new Date(pk + 'T00:00:00');
      if (pd.getFullYear() === priorYear && pd.getMonth() === month) {
        return { pct: calcWoW(currentVal, val), priorVal: val };
      }
    }
  } else if (activeGranularity === 'day') {
    // Match same weekday of same ISO week in prior year
    const isoWk = getISOWeek(d);
    const dayOfWeek = d.getUTCDay(); // 0=Sun..6=Sat
    const priorYear = getISOYear(d) - 1;
    for (const [pk, val] of periodMap) {
      const pd = new Date(pk + 'T00:00:00');
      if (getISOYear(pd) === priorYear && getISOWeek(pd) === isoWk && pd.getUTCDay() === dayOfWeek) {
        return { pct: calcWoW(currentVal, val), priorVal: val };
      }
    }
  } else {
    const isoWk = getISOWeek(d);
    const priorYear = getISOYear(d) - 1;
    for (const [pk, val] of periodMap) {
      const pd = new Date(pk + 'T00:00:00');
      if (getISOYear(pd) === priorYear && getISOWeek(pd) === isoWk) {
        return { pct: calcWoW(currentVal, val), priorVal: val };
      }
    }
  }
  return { pct: null, priorVal: null };
}

/**
 * NC Penetration: New Customers / Total Orders * 100.
 * @param {number} nc
 * @param {number} totalOrders
 * @returns {number}
 */
function calcNCPenetration(nc, totalOrders) {
  if (!totalOrders || totalOrders === 0) return 0;
  return (nc / totalOrders) * 100;
}

/**
 * Prime Penetration: Prime Orders / Orders (excl. on-demand) * 100.
 * @param {number} ordersPrime
 * @param {number} ordersNoOndemand
 * @returns {number}
 */
function calcPrimePenetration(ordersPrime, ordersNoOndemand) {
  if (!ordersNoOndemand || ordersNoOndemand === 0) return 0;
  return (ordersPrime / ordersNoOndemand) * 100;
}

/**
 * N-period rolling average.
 * @param {number[]} values - ordered chronologically
 * @param {number} window - default 4
 * @returns {(number|null)[]}
 */
function calcRollingAvg(values, window = 4) {
  return values.map((_, i) => {
    if (i < window - 1) return null;
    let sum = 0;
    for (let j = i - window + 1; j <= i; j++) sum += (values[j] || 0);
    return sum / window;
  });
}

/**
 * Streak: how many consecutive weeks a metric has been rising or falling.
 * @param {number[]} values - chronological order
 * @returns {{count: number, direction: 'up'|'down'|'flat'}}
 */
function calcStreak(values) {
  if (values.length < 2) return { count: 0, direction: 'flat' };
  let direction = null;
  let count = 0;
  for (let i = values.length - 1; i >= 1; i--) {
    const diff = values[i] - values[i - 1];
    const dir = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    if (dir === 'flat') break;
    if (direction === null) direction = dir;
    if (dir !== direction) break;
    count++;
  }
  return { count, direction: direction || 'flat' };
}

/**
 * Best and worst values in an array with their indices.
 * @param {number[]} values
 * @param {string[]} labels - week labels for display
 * @returns {{best: {val:number,label:string}, worst: {val:number,label:string}}|null}
 */
function calcBestWorst(values, labels) {
  if (!values.length) return null;
  let bestI = 0, worstI = 0;
  for (let i = 1; i < values.length; i++) {
    if (values[i] > values[bestI]) bestI = i;
    if (values[i] < values[worstI]) worstI = i;
  }
  return {
    best:  { val: values[bestI],  label: labels[bestI]  || '' },
    worst: { val: values[worstI], label: labels[worstI] || '' },
  };
}

/**
 * Check if a period date is the current (potentially partial) period.
 * @param {string} periodDate - YYYY-MM-DD
 * @returns {boolean}
 */
function isCurrentPeriod(periodDate) {
  const now = new Date();
  const d = new Date(periodDate + 'T00:00:00');
  if (activeGranularity === 'day') {
    return d.toISOString().slice(0,10) === now.toISOString().slice(0,10);
  } else if (activeGranularity === 'month') {
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  } else {
    return getISOYear(now) === getISOYear(d) && getISOWeek(now) === getISOWeek(d);
  }
}

/** ISO week number (1-53). */
function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
}

/** ISO year for week (handles year boundary). */
function getISOYear(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  return date.getUTCFullYear();
}

// ═══════════════════════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════════════════════

/**
 * @typedef {Object} SheetRow
 * @property {string} period - YYYY-MM-DD
 * @property {string} country - 2-letter code
 * @property {string} granularity - 'day'|'week'|'month'
 * @property {number} ordersNoOndemand
 * @property {number} nc - new customers
 * @property {number} ordersOndemand
 * @property {number} ordersPrime
 * @property {number} totalOrders
 * @property {number} ncPenetration
 * @property {number} primePenetration
 */

/**
 * Parse raw Google Sheet rows into typed objects.
 * @param {string[]} headers
 * @param {string[][]} rows
 * @returns {SheetRow[]}
 */
function parseSheetData(headers, rows) {
  const idx = {};
  headers.forEach((h, i) => { idx[h.toLowerCase().trim()] = i; });
  // Support both old ('week') and new ('period') column names
  const pi = idx['period'] ?? idx['week'] ?? 0;
  const ci = idx['country'] ?? 1;
  const oi = idx['orders_no_ondemand'] ?? 2;
  const ni = idx['nc'] ?? 3;
  const di = idx['orders_ondemand'] ?? 4;
  const pri = idx['orders_prime'] ?? idx['prime_orders'] ?? -1;
  const gi = idx['data_granularity'] ?? idx['granularity'] ?? -1;

  return rows.map(r => {
    const ordersNoOndemand = parseInt(r[oi]) || 0;
    const nc = parseInt(r[ni]) || 0;
    const ordersOndemand = parseInt(r[di]) || 0;
    const ordersPrime = pri >= 0 ? (parseInt(r[pri]) || 0) : 0;
    const totalOrders = ordersNoOndemand + ordersOndemand;
    const granularity = gi >= 0 && r[gi] ? r[gi].toLowerCase().trim() : 'week';
    return {
      period: r[pi] || '',
      country: r[ci] || '',
      granularity,
      ordersNoOndemand,
      nc,
      ordersOndemand,
      ordersPrime,
      totalOrders,
      ncPenetration: calcNCPenetration(nc, totalOrders),
      primePenetration: calcPrimePenetration(ordersPrime, ordersNoOndemand),
    };
  }).filter(r => r.period);
}

/**
 * @typedef {Object} PeriodAgg
 * @property {string} period
 * @property {number} ordersNoOndemand
 * @property {number} nc
 * @property {number} ordersOndemand
 * @property {number} ordersPrime
 * @property {number} totalOrders
 * @property {number} ncPenetration
 * @property {number} primePenetration
 */

/**
 * Aggregate rows by period (summing across selected countries).
 * @param {SheetRow[]} rows
 * @returns {PeriodAgg[]} sorted chronologically (oldest first)
 */
function aggregateByPeriod(rows) {
  const map = new Map();
  for (const r of rows) {
    let w = map.get(r.period);
    if (!w) { w = { period: r.period, ordersNoOndemand: 0, nc: 0, ordersOndemand: 0, ordersPrime: 0 }; map.set(r.period, w); }
    w.ordersNoOndemand += r.ordersNoOndemand;
    w.nc += r.nc;
    w.ordersOndemand += r.ordersOndemand;
    w.ordersPrime += r.ordersPrime;
  }
  return Array.from(map.values()).map(w => {
    w.totalOrders = w.ordersNoOndemand + w.ordersOndemand;
    w.ncPenetration = calcNCPenetration(w.nc, w.totalOrders);
    w.primePenetration = calcPrimePenetration(w.ordersPrime, w.ordersNoOndemand);
    return w;
  }).sort((a, b) => a.period.localeCompare(b.period));
}

// Backward-compat alias used in YoY builder
function aggregateByWeek(rows) { return aggregateByPeriod(rows); }

/**
 * Build a lookup map of period -> metric value (for YoY).
 * @param {PeriodAgg[]} periods
 * @param {string} metric - property name
 * @returns {Map<string, number>}
 */
function buildWeekMap(periods, metric) {
  const m = new Map();
  for (const w of periods) m.set(w.period, w[metric]);
  return m;
}

let rawDataAll = [];       // SheetRow[] — ALL parsed rows (all granularities)
let rawData = [];          // SheetRow[] — filtered by active granularity
let allCountries = [];     // sorted unique country codes
let selectedCountries = []; // [] means ALL
let activeGranularity = 'week'; // 'day'|'week'|'month'
let rangePeriods = 13;     // 0 = all
let weeklyData = [];       // PeriodAgg[] — current filtered + aggregated
let allWeeklyData = [];    // PeriodAgg[] — full history for YoY lookups
let tableRows = [];        // for table display
let filteredTableRows = [];
let sortCol = -1, sortAsc = true;
let currentPage = 1;
let charts = {};
let countdownTimer = null;
let refreshCountdown = 60;
let lastFetchedHeaders = [];
let lastFetchedRows = [];

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData() {
  setProgress(15);
  try {
    const res = await fetch('/api/data');
    setProgress(50);
    const data = await res.json();
    if (data.error) { showError(data.error, data.message || ''); setProgress(0); return; }

    lastFetchedHeaders = data.headers;
    lastFetchedRows = data.rows;
    rawDataAll = parseSheetData(data.headers, data.rows);
    allCountries = [...new Set(rawDataAll.map(r => r.country))].sort();

    // Init filters from URL or defaults
    initCountryFilterFromURL();
    renderCountryDropdown();
    applyGranularity();
    applyFilters();

    document.getElementById('dashTitle').textContent = 'Africa Weekly Orders Dashboard';
    setProgress(100);
    setTimeout(() => setProgress(0), 400);
    updateStatus(`Last updated: ${new Date().toLocaleTimeString()}`, `${rawData.length} rows loaded`);
    resetCountdown();
  } catch (e) {
    showError('Connection error', e.message);
    setProgress(0);
  }
}

function applyGranularity() {
  rawData = rawDataAll.filter(r => r.granularity === activeGranularity);
}

function applyFilters() {
  // Filter by country
  const filtered = selectedCountries.length
    ? rawData.filter(r => selectedCountries.includes(r.country))
    : rawData;

  // Full history aggregated (for YoY lookups, no date range limit)
  allWeeklyData = aggregateByPeriod(filtered);

  // Apply date range
  let ranged = allWeeklyData;
  if (rangePeriods > 0 && allWeeklyData.length > rangePeriods) {
    ranged = allWeeklyData.slice(-rangePeriods);
  }
  weeklyData = ranged;

  // Table rows = filtered raw data within date range
  const minPeriod = weeklyData.length ? weeklyData[0].period : '';
  tableRows = filtered.filter(r => r.period >= minPeriod).sort((a, b) => b.period.localeCompare(a.period) || a.country.localeCompare(b.country));
  filteredTableRows = [...tableRows];

  document.getElementById('stateMsg').style.display = 'none';
  renderAll();
  syncURL();
}

function renderAll() {
  renderKPIs();
  renderCharts();
  renderYoYCharts();
  renderCountryTables();
  renderTable();
  const sub = selectedCountries.length
    ? selectedCountries.map(c => COUNTRY_NAMES[c] || c).join(', ')
    : 'All Countries';
  const latest = weeklyData.length ? weeklyData[weeklyData.length - 1].period : '';
  document.getElementById('dashSubtitle').textContent = `${sub} · ${GRAN_LABELS[activeGranularity]} · Latest: ${formatPeriodLabel(latest)}`;
}

// ═══════════════════════════════════════════════════════════════
//  COUNTRY FILTER
// ═══════════════════════════════════════════════════════════════
function renderCountryDropdown() {
  const dd = document.getElementById('countryDropdown');
  let html = `<div class="ms-option all-opt" onclick="toggleAllCountries()">
    <input type="checkbox" id="cb_all" ${selectedCountries.length === 0 ? 'checked' : ''}> All Countries
  </div>`;
  for (const c of allCountries) {
    const checked = selectedCountries.length === 0 || selectedCountries.includes(c) ? 'checked' : '';
    html += `<div class="ms-option" onclick="toggleCountry('${c}')">
      <input type="checkbox" id="cb_${c}" ${checked}> ${COUNTRY_NAMES[c] || c} (${c})
    </div>`;
  }
  dd.innerHTML = html;
  updateTriggerLabel();
}

function toggleDropdown() {
  document.getElementById('countryDropdown').classList.toggle('open');
}

function toggleAllCountries() {
  selectedCountries = [];
  renderCountryDropdown();
  applyFilters();
}

function toggleCountry(code) {
  if (selectedCountries.length === 0) {
    // Was "All" — switch to all except this one? No, switch to only this one
    selectedCountries = [code];
  } else if (selectedCountries.includes(code)) {
    selectedCountries = selectedCountries.filter(c => c !== code);
    if (selectedCountries.length === 0) selectedCountries = []; // back to all
  } else {
    selectedCountries.push(code);
  }
  // If all selected individually, revert to "All"
  if (selectedCountries.length === allCountries.length) selectedCountries = [];
  renderCountryDropdown();
  applyFilters();
}

function updateTriggerLabel() {
  const trigger = document.getElementById('countryTrigger');
  if (selectedCountries.length === 0) trigger.textContent = 'All Countries';
  else if (selectedCountries.length === 1) trigger.textContent = COUNTRY_NAMES[selectedCountries[0]] || selectedCountries[0];
  else trigger.textContent = `${selectedCountries.length} countries`;
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  const ms = document.getElementById('countryFilter');
  if (!ms.contains(e.target)) document.getElementById('countryDropdown').classList.remove('open');
});

function setGranularity(gran) {

// ═══════════════════════════════════════════════════════════════
//  URL SYNC
// ═══════════════════════════════════════════════════════════════
function syncURL() {
  const params = new URLSearchParams();
  if (selectedCountries.length) params.set('country', selectedCountries.join(','));
  if (activeGranularity !== 'week') params.set('gran', activeGranularity);
  if (rangePeriods !== 13) params.set('range', rangePeriods);
  const qs = params.toString();
  const url = qs ? `${location.pathname}?${qs}` : location.pathname;
  history.replaceState(null, '', url);
}

function initCountryFilterFromURL() {
  const params = new URLSearchParams(location.search);
  const c = params.get('country');
  if (c) selectedCountries = c.split(',').filter(x => allCountries.includes(x));
  else selectedCountries = [];
  const g = params.get('gran');
  if (g && ['day','week','month'].includes(g)) {
    activeGranularity = g;
    document.querySelectorAll('#granPills .range-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.gran === activeGranularity);
    });
  }
  const r = params.get('range');
  if (r != null) {
    rangePeriods = parseInt(r) || 0;
    document.querySelectorAll('#rangePills .range-pill').forEach(p => {
      p.classList.toggle('active', parseInt(p.dataset.periods) === rangePeriods);
    });
  }
}

function renderKPIs() {
  const grid = document.getElementById('kpiGrid');
  if (!weeklyData.length) { grid.innerHTML = ''; return; }

  const metrics = [
    { key: 'totalOrders',       label: 'Total Orders',        fmt: fmtInt,  pct: false },
    { key: 'nc',                label: 'New Customers',       fmt: fmtInt,  pct: false },
    { key: 'ncPenetration',     label: 'NC Penetration',      fmt: fmtPct,  pct: true  },
    { key: 'primePenetration',  label: 'Prime Penetration',   fmt: fmtPct,  pct: true  },
    { key: 'ordersOndemand',    label: 'On-Demand Orders',    fmt: fmtInt,  pct: false },
  ];

  const latest = weeklyData[weeklyData.length - 1];
  const prev   = weeklyData.length > 1 ? weeklyData[weeklyData.length - 2] : null;
  const partial = isCurrentPeriod(latest.period);

  // Build full-history week maps for YoY
  const fullMaps = {};
  for (const m of metrics) fullMaps[m.key] = buildWeekMap(allWeeklyData, m.key);

  const deltaLabel = activeGranularity === 'day' ? 'DoD' : activeGranularity === 'month' ? 'MoM' : 'WoW';
  grid.innerHTML = metrics.map(m => {
    const val = latest[m.key];
    const wow = prev ? calcWoW(val, prev[m.key]) : null;
    const yoy = calcYoY(latest.period, val, fullMaps[m.key]);
    const vals = weeklyData.map(w => w[m.key]);
    const labels = weeklyData.map(w => w.period);
    const streak = calcStreak(vals);
    const bw = calcBestWorst(vals, labels);
    const sparkVals = vals.slice(-8);

    const periodWord = activeGranularity === 'day' ? 'day' : activeGranularity === 'month' ? 'month' : 'week';
    return `<div class="kpi-card">
      <div class="kpi-top">
        <div class="kpi-label">${m.label}</div>
        ${partial ? `<span class="kpi-partial">Partial ${periodWord}</span>` : ''}
      </div>
      <div class="kpi-value-row">
        <div class="kpi-value">${m.fmt(val)}</div>
        <div class="kpi-deltas">
          ${renderDelta(wow, deltaLabel)}
          ${renderDelta(yoy.pct, 'YoY')}
        </div>
      </div>
      ${streak.count > 0 ? `<div class="kpi-streak">${streak.direction === 'up' ? '&#9650;' : '&#9660;'} ${streak.count} ${periodWord}${streak.count > 1 ? 's' : ''} in a row</div>` : ''}
      <div class="kpi-sparkline">${renderSparkline(sparkVals)}</div>
      ${bw ? `<div class="kpi-best-worst">
        <span class="bw-best">Best: ${m.fmt(bw.best.val)} (${formatPeriodLabel(bw.best.label)})</span>
        <span class="bw-worst">Worst: ${m.fmt(bw.worst.val)} (${formatPeriodLabel(bw.worst.label)})</span>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderDelta(pct, label) {
  if (pct == null) return `<span class="kpi-delta flat">N/A ${label}</span>`;
  const cls = Math.abs(pct) < 0.5 ? 'flat' : pct > 0 ? 'up' : 'down';
  const arrow = cls === 'up' ? '&#9650;' : cls === 'down' ? '&#9660;' : '';
  return `<span class="kpi-delta ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}% ${label}</span>`;
}

function renderSparkline(vals) {
  if (vals.length < 2) return '';
  const w = 200, h = 32, pad = 2;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const points = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  });
  const trend = vals[vals.length - 1] >= vals[0] ? 'var(--green)' : 'var(--red)';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points.join(' ')}" fill="none" stroke="${trend}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════
//  YoY COMPARISON CHARTS (Orders & NC, excl. on-demand)
// ═══════════════════════════════════════════════════════════════

/**
 * Build YoY comparison data: group by ISO week number, one series per year.
 * Uses allWeeklyData (full history, ignoring date range) so all years are visible.
 * @param {string} metric - 'ordersNoOndemand' or 'nc'
 * @returns {{weekNums: number[], years: string[], seriesByYear: Object<string, (number|null)[]>}}
 */
function buildYoYSeries(metric) {
  // Filter raw data by selected countries, aggregate by week
  const filtered = selectedCountries.length
    ? rawData.filter(r => selectedCountries.includes(r.country))
    : rawData;
  const weekly = aggregateByPeriod(filtered); // full history, sorted asc

  // Group values by isoYear -> isoWeek -> value
  const byYear = {}; // { '2023': { 1: val, 2: val, ... }, ... }
  for (const w of weekly) {
    const d = new Date(w.period + 'T00:00:00');
    const yr = String(getISOYear(d));
    const wk = getISOWeek(d);
    if (!byYear[yr]) byYear[yr] = {};
    byYear[yr][wk] = w[metric];
  }

  const years = Object.keys(byYear).sort();
  // Determine the range of week numbers present across all years
  const allWeekNums = new Set();
  for (const yr of years) {
    for (const wk of Object.keys(byYear[yr])) allWeekNums.add(parseInt(wk));
  }
  const weekNums = [...allWeekNums].sort((a, b) => a - b);

  // Build series: for each year, array of values aligned to weekNums
  const seriesByYear = {};
  for (const yr of years) {
    seriesByYear[yr] = weekNums.map(wk => byYear[yr][wk] ?? null);
  }

  return { weekNums, years, seriesByYear };
}

function renderYoYCharts() {
  const grid = document.getElementById('yoyChartGrid');
  const sectionTitle = document.getElementById('yoySectionTitle');
  // Destroy previous YoY charts
  ['yoyOrders', 'yoyNC'].forEach(id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } });

  // YoY charts only make sense for weekly/monthly
  if (activeGranularity === 'day' || allWeeklyData.length < 2) {
    grid.innerHTML = '';
    sectionTitle.style.display = activeGranularity === 'day' ? 'none' : '';
    return;
  }
  sectionTitle.style.display = '';

  const defs = [
    { id: 'yoyOrders', title: 'Orders YoY Comparison (excl. On-Demand)', metric: 'ordersNoOndemand', fmt: fmtInt },
    { id: 'yoyNC',     title: 'New Customers YoY Comparison',            metric: 'nc',                fmt: fmtInt },
  ];

  grid.innerHTML = defs.map(d => `
    <div class="chart-card">
      <div class="chart-header"><span class="chart-title">${d.title}</span></div>
      <div class="chart-wrap tall"><canvas id="${d.id}"></canvas></div>
    </div>
  `).join('');

  defs.forEach((d, di) => {
    const { weekNums, years, seriesByYear } = buildYoYSeries(d.metric);
    const labels = weekNums.map(w => `W${String(w).padStart(2, '0')}`);

    // Determine current year to make its line thicker
    const currentYear = String(getISOYear(new Date()));

    const datasets = years.map((yr, i) => ({
      label: yr,
      data: seriesByYear[yr],
      borderColor: YOY_COLORS[i % YOY_COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: yr === currentYear ? 3 : 1.5,
      pointRadius: yr === currentYear ? 2 : 0,
      pointHoverRadius: 4,
      tension: 0.3,
      spanGaps: true,
      borderDash: yr === currentYear ? [] : [4, 2],
    }));

    const ctx = document.getElementById(d.id).getContext('2d');
    charts[d.id] = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: true, labels: { color: '#6b7280', boxWidth: 14, font: { size: 11 } } },
          tooltip: {
            backgroundColor: '#fff', borderColor: '#e2e4ea', borderWidth: 1,
            titleColor: '#1a1a2e', bodyColor: '#1a1a2e', padding: 10,
            callbacks: { label: ctx => ctx.raw != null ? `${ctx.dataset.label}: ${d.fmt(ctx.raw)}` : '' },
          },
        },
        scales: {
          x: { ticks: { color: '#6b7280', maxRotation: 0, maxTicksLimit: 26, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.3)' } },
          y: { ticks: { color: '#6b7280', font: { size: 11 }, callback: v => fmtShort(v) }, grid: { color: 'rgba(0,0,0,.3)' } },
        },
      },
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  COUNTRY BREAKDOWN TABLES
// ═══════════════════════════════════════════════════════════════

/**
 * Build per-country weekly data with WoW and YoY deltas.
 * @param {string} countryCode
 * @returns {Array<{week:string, isoWk:number, isoYr:number, orders:number, nc:number, ordersWoW:number|null, ncWoW:number|null, ordersYoY:number|null, ncYoY:number|null}>}
 */
function buildCountryWeeklyData(countryCode) {
  const countryRows = rawData.filter(r => r.country === countryCode);
  const byPeriod = new Map();
  for (const r of countryRows) {
    let w = byPeriod.get(r.period);
    if (!w) { w = { period: r.period, orders: 0, nc: 0 }; byPeriod.set(r.period, w); }
    w.orders += r.ordersNoOndemand;
    w.nc += r.nc;
  }
  const weeks = Array.from(byPeriod.values()).sort((a, b) => a.period.localeCompare(b.period));

  // Build lookup for YoY: key = isoYear-isoWeek-dayOfWeek (daily), isoYear-isoWeek (weekly), year-month (monthly)
  const ordersByIsoKey = {};
  const ncByIsoKey = {};
  for (const w of weeks) {
    const d = new Date(w.period + 'T00:00:00');
    const key = activeGranularity === 'month'
      ? `${d.getFullYear()}-${d.getMonth()}`
      : activeGranularity === 'day'
        ? `${getISOYear(d)}-${getISOWeek(d)}-${d.getUTCDay()}`
        : `${getISOYear(d)}-${getISOWeek(d)}`;
    ordersByIsoKey[key] = w.orders;
    ncByIsoKey[key] = w.nc;
  }

  const result = weeks.map((w, i) => {
    const d = new Date(w.period + 'T00:00:00');
    const isoWk = getISOWeek(d);
    const isoYr = getISOYear(d);
    const prev = i > 0 ? weeks[i - 1] : null;
    const priorYearKey = activeGranularity === 'month'
      ? `${d.getFullYear() - 1}-${d.getMonth()}`
      : activeGranularity === 'day'
        ? `${isoYr - 1}-${isoWk}-${d.getUTCDay()}`
        : `${isoYr - 1}-${isoWk}`;

    return {
      period: w.period,
      isoWk,
      isoYr,
      orders: w.orders,
      nc: w.nc,
      ordersWoW: prev ? calcWoW(w.orders, prev.orders) : null,
      ncWoW: prev ? calcWoW(w.nc, prev.nc) : null,
      ordersYoY: ordersByIsoKey[priorYearKey] != null ? calcWoW(w.orders, ordersByIsoKey[priorYearKey]) : null,
      ncYoY: ncByIsoKey[priorYearKey] != null ? calcWoW(w.nc, ncByIsoKey[priorYearKey]) : null,
    };
  });

  return result;
}

function renderCountryTables() {
  const grid = document.getElementById('countryTablesGrid');
  const countries = selectedCountries.length ? selectedCountries : allCountries;

  if (!countries.length || !rawData.length) { grid.innerHTML = ''; return; }

  const minPeriod = weeklyData.length ? weeklyData[0].period : '';

  grid.innerHTML = countries.map(code => {
    let rows = buildCountryWeeklyData(code);
    if (minPeriod) rows = rows.filter(r => r.period >= minPeriod);
    // Show newest first
    rows = rows.slice().reverse();

    if (!rows.length) return '';

    const tableHtml = `
      <div class="country-table-card">
        <div class="card-header">
          <span class="card-title">${COUNTRY_NAMES[code] || code} (${code})</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="text-align:left">Week</th>
              <th>Orders</th>
              <th>New Customers</th>
              <th>Orders WoW</th>
              <th>NC WoW</th>
              <th>Orders YoY</th>
              <th>NC YoY</th>
            </tr></thead>
            <tbody>
              ${rows.map(r => `<tr>
                <td style="text-align:left">${formatPeriodLabel(r.period)}${isCurrentPeriod(r.period) ? ' <span class="chip chip-red" style="font-size:9px">partial</span>' : ''}</td>
                <td>${r.orders.toLocaleString()}</td>
                <td>${r.nc.toLocaleString()}</td>
                <td>${fmtDeltaCell(r.ordersWoW)}</td>
                <td>${fmtDeltaCell(r.ncWoW)}</td>
                <td>${fmtDeltaCell(r.ordersYoY)}</td>
                <td>${fmtDeltaCell(r.ncYoY)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    return tableHtml;
  }).join('');
}

/**
 * Format a percentage delta for table cells with color coding.
 * @param {number|null} pct
 * @returns {string} HTML string
 */
function fmtDeltaCell(pct) {
  if (pct == null) return '<span class="delta-flat">--</span>';
  const cls = Math.abs(pct) < 0.5 ? 'delta-flat' : pct > 0 ? 'delta-up' : 'delta-down';
  const sign = pct > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

// ═══════════════════════════════════════════════════════════════
//  DATA TABLE
// ═══════════════════════════════════════════════════════════════
function renderTable() {
  if (!tableRows.length) { document.getElementById('tableCard').style.display = 'none'; return; }
  document.getElementById('tableCard').style.display = '';
  document.getElementById('tableTitle').textContent = `Detail Data · ${tableRows.length} rows`;
  document.getElementById('searchInput').value = '';

  const cols = ['period', 'country', 'ordersNoOndemand', 'ordersOndemand', 'totalOrders', 'nc', 'ordersPrime', 'ncPenetration', 'primePenetration'];
  const colLabels = ['Period', 'Country', 'Orders', 'On-Demand', 'Total Orders', 'New Customers', 'Prime Orders', 'NC Pen. %', 'Prime Pen. %'];

  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + colLabels.map((h, i) =>
    `<th onclick="sortTableBy(${i})" id="th_${i}">${esc(h)}<span class="sort-icon"> &#8597;</span></th>`
  ).join('') + '</tr>';

  filteredTableRows = [...tableRows];
  sortCol = -1;
  currentPage = 1;
  renderTablePage(cols);
}

function renderTablePage(cols) {
  cols = cols || ['period', 'country', 'ordersNoOndemand', 'ordersOndemand', 'totalOrders', 'nc', 'ordersPrime', 'ncPenetration', 'primePenetration'];
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredTableRows.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = page.map(row => {
    return '<tr>' + cols.map(col => {
      let v = row[col];
      if (col === 'country') return `<td>${COUNTRY_NAMES[v] || v} (${v})</td>`;
      if (col === 'period') return `<td>${formatPeriodLabel(v)}${isCurrentPeriod(v) ? ' <span class="chip chip-red" style="font-size:9px">partial</span>' : ''}</td>`;
      if (col === 'ncPenetration' || col === 'primePenetration') return `<td class="num">${v.toFixed(2)}%</td>`;
      if (typeof v === 'number') return `<td class="num">${v.toLocaleString()}</td>`;
      return `<td>${esc(String(v))}</td>`;
    }).join('') + '</tr>';
  }).join('');

  // Pagination
  const total = filteredTableRows.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  document.getElementById('paginationInfo').textContent = `${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total}`;
  const btns = document.getElementById('pageBtns');
  let bhtml = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>Prev</button>`;
  for (let p = Math.max(1, currentPage - 2); p <= Math.min(pages, currentPage + 2); p++) {
    bhtml += `<button class="page-btn ${p === currentPage ? 'current' : ''}" onclick="goPage(${p})">${p}</button>`;
  }
  bhtml += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= pages ? 'disabled' : ''}>Next</button>`;
  btns.innerHTML = bhtml;
}

function sortTableBy(ci) {
  const cols = ['period', 'country', 'ordersNoOndemand', 'ordersOndemand', 'totalOrders', 'nc', 'ordersPrime', 'ncPenetration', 'primePenetration'];
  const key = cols[ci];
  if (sortCol === ci) sortAsc = !sortAsc; else { sortCol = ci; sortAsc = true; }
  filteredTableRows.sort((a, b) => {
    const av = a[key], bv = b[key];
    const cmp = typeof av === 'number' ? av - bv : String(av).localeCompare(String(bv));
    return sortAsc ? cmp : -cmp;
  });
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById(`th_${ci}`);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = sortAsc ? ' \u2191' : ' \u2193'; }
  currentPage = 1;
  renderTablePage();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredTableRows = q
    ? tableRows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)))
    : [...tableRows];
  currentPage = 1;
  renderTablePage();
}

function goPage(p) {
  const pages = Math.ceil(filteredTableRows.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTablePage();
}

// ═══════════════════════════════════════════════════════════════
//  CSV EXPORT (scoped to current filters)
// ═══════════════════════════════════════════════════════════════
function exportCSV() {
  const cols = ['period', 'country', 'ordersNoOndemand', 'ordersOndemand', 'totalOrders', 'nc', 'ordersPrime', 'ncPenetration', 'primePenetration'];
  const headers = ['Period', 'Country', 'Orders', 'On-Demand', 'Total Orders', 'New Customers', 'Prime Orders', 'NC Penetration %', 'Prime Penetration %'];
  const lines = [headers.join(',')];
  for (const r of filteredTableRows) {
    lines.push(cols.map(c => {
      const v = r[c];
      if (typeof v === 'number' && (c === 'ncPenetration' || c === 'primePenetration')) return v.toFixed(2);
      return typeof v === 'string' && v.includes(',') ? `"${v}"` : v;
    }).join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const suffix = selectedCountries.length ? `_${selectedCountries.join('-')}` : '_all';
  a.download = `scorecard${suffix}_${activeGranularity}_${rangePeriods || 'all'}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════════════════
//  FORMATTING HELPERS
// ═══════════════════════════════════════════════════════════════
function fmtInt(n) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '--';
  return n.toFixed(2) + '%';
}
function fmtShort(n) {
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function formatPeriodLabel(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (activeGranularity === 'day') {
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
  } else if (activeGranularity === 'month') {
    return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  } else {
    const wk = getISOWeek(d);
    const yr = getISOYear(d);
    return `W${String(wk).padStart(2, '0')} ${yr}`;
  }
}
// Backward compat alias
function formatWeekLabel(s) { return formatPeriodLabel(s); }
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
function setProgress(pct) { document.getElementById('progressBar').style.width = pct + '%'; }
function updateStatus(l, r) { document.getElementById('statusLeft').textContent = l; document.getElementById('statusRight').textContent = r; }
function showError(title, msg) {
  document.getElementById('stateMsg').style.display = '';
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('kpiGrid').innerHTML = '';
  document.getElementById('chartGrid').innerHTML = '';
  document.getElementById('stateMsg').innerHTML = `<h2>${esc(title)}</h2><p>${esc(msg)}</p><button class="btn" onclick="loadData()">Try Again</button>`;
}

function resetCountdown() {
  clearInterval(countdownTimer);
  refreshCountdown = 60;
  countdownTimer = setInterval(() => {
    refreshCountdown--;
    document.getElementById('nextRefreshLabel').textContent =
      refreshCountdown > 0 ? `Refreshing in ${refreshCountdown}s` : 'Refreshing...';
    if (refreshCountdown <= 0) { clearInterval(countdownTimer); loadData(); }
  }, 1000);
}

loadData();
