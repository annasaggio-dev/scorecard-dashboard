<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scorecard Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header-subtitle { font-size: 13px; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 16px; }
    .refresh-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-ghost {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    /* ── Layout ── */
    .container { max-width: 1600px; margin: 0 auto; padding: 24px 28px; }

    /* ── Sheet tabs ── */
    .sheet-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .sheet-tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .sheet-tab:hover { color: var(--text); border-color: var(--accent); }
    .sheet-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color .15s;
    }
    .kpi-card:hover { border-color: var(--accent); }
    .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 700; }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .kpi-trend { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; margin-top: 6px; }
    .kpi-trend.up { color: var(--green); }
    .kpi-trend.down { color: var(--red); }

    /* ── Table ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 28px;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title { font-size: 15px; font-weight: 600; }

    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      width: 220px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background: var(--surface2); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th .sort-icon { opacity: 0.4; margin-left: 4px; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    td {
      padding: 11px 16px;
      border-top: 1px solid var(--border);
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tr:hover td { background: var(--surface2); }

    /* status chips */
    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .chip-green { background: rgba(34,197,94,.15); color: var(--green); }
    .chip-red   { background: rgba(239,68,68,.15);  color: var(--red); }
    .chip-yellow{ background: rgba(245,158,11,.15); color: var(--yellow); }
    .chip-blue  { background: rgba(79,142,247,.15); color: var(--accent); }

    /* numeric cells */
    .num { font-variant-numeric: tabular-nums; text-align: right; }

    /* pagination */
    .pagination {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-btn.current { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── Chart grid ── */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--muted); }
    .chart-wrap { position: relative; height: 220px; }

    /* ── Status bar ── */
    .statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 28px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Error / Loading ── */
    .center-msg {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .center-msg .icon { font-size: 48px; margin-bottom: 12px; }
    .center-msg h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .center-msg p { font-size: 14px; max-width: 400px; margin: 0 auto 20px; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; background: var(--accent);
      transition: width .3s;
      z-index: 200;
    }
  </style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0%"></div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <div>
      <div class="header h1" id="dashTitle">Scorecard Dashboard</div>
      <div class="header-subtitle" id="dashSubtitle">Loading...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-badge">
      <span class="dot" id="liveIndicator"></span>
      <span id="nextRefreshLabel">Refreshing in 30s</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadData()">↻ Refresh Now</button>
  </div>
</div>

<!-- Main content -->
<div class="container">
  <!-- Sheet tabs -->
  <div class="sheet-tabs" id="sheetTabs"></div>

  <!-- KPI cards -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Charts -->
  <div class="chart-grid" id="chartGrid"></div>

  <!-- Data table -->
  <div class="card" id="tableCard" style="display:none">
    <div class="card-header">
      <span class="card-title" id="tableTitle">Data</span>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="search-input" id="searchInput" placeholder="Search..." oninput="filterTable()" />
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span id="paginationInfo"></span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

  <!-- Loading / Error state -->
  <div id="stateMsg" class="center-msg">
    <div class="spinner"></div>
    <h2>Loading data...</h2>
    <p>Connecting to Google Sheets</p>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span id="statusLeft">—</span>
  <span id="statusRight">—</span>
</div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let allData = { headers: [], rows: [] };
let filteredRows = [];
let sortCol = -1, sortAsc = true;
let currentPage = 1;
const PAGE_SIZE = 50;
let refreshCountdown = 30;
let refreshTimer = null;
let countdownTimer = null;
let activeSheet = null;
const charts = {};

// ─────────────────────────────────────────────
//  Data loading
// ─────────────────────────────────────────────
async function loadData(sheetName) {
  setProgress(20);
  const url = sheetName ? `/api/sheet/${encodeURIComponent(sheetName)}` : '/api/data';
  try {
    const res = await fetch(url);
    setProgress(60);
    const data = await res.json();

    if (data.error) {
      showError(data.error, data.message || '');
      setProgress(0);
      return;
    }

    allData = data;
    activeSheet = data.sheet_name;
    renderDashboard(data);
    setProgress(100);
    setTimeout(() => setProgress(0), 400);
    updateStatus(`Last updated: ${new Date().toLocaleTimeString()}`, `${data.rows.length} rows`);
    resetCountdown();
  } catch (e) {
    showError('Connection error', e.message);
    setProgress(0);
  }
}

function resetCountdown() {
  clearInterval(countdownTimer);
  refreshCountdown = 30;
  countdownTimer = setInterval(() => {
    refreshCountdown--;
    document.getElementById('nextRefreshLabel').textContent =
      refreshCountdown > 0 ? `Refreshing in ${refreshCountdown}s` : 'Refreshing...';
    if (refreshCountdown <= 0) {
      clearInterval(countdownTimer);
      loadData(activeSheet);
    }
  }, 1000);
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function renderDashboard(data) {
  document.getElementById('stateMsg').style.display = 'none';

  // Titles
  document.getElementById('dashTitle').textContent =
    data.spreadsheet_title || 'Scorecard Dashboard';
  document.getElementById('dashSubtitle').textContent =
    `Sheet: ${data.sheet_name || ''}`;

  // Sheet tabs
  renderSheetTabs(data.all_sheets || [], data.sheet_name);

  // Table
  renderTable(data.headers, data.rows);

  // KPIs & charts from numeric columns
  renderKPIs(data.headers, data.rows);
  renderCharts(data.headers, data.rows);
}

function renderSheetTabs(sheets, active) {
  const container = document.getElementById('sheetTabs');
  if (sheets.length <= 1) { container.innerHTML = ''; return; }
  container.innerHTML = sheets.map(s => `
    <div class="sheet-tab ${s === active ? 'active' : ''}"
         onclick="switchSheet('${escHtml(s)}')">${escHtml(s)}</div>
  `).join('');
}

function switchSheet(name) {
  loadData(name);
}

// ── KPI Cards ──────────────────────────────
function renderKPIs(headers, rows) {
  const grid = document.getElementById('kpiGrid');
  if (!headers.length || !rows.length) { grid.innerHTML = ''; return; }

  const numericCols = detectNumericCols(headers, rows);
  if (numericCols.length === 0) { grid.innerHTML = ''; return; }

  const cards = numericCols.slice(0, 8).map(ci => {
    const vals = rows.map(r => parseNum(r[ci])).filter(v => !isNaN(v));
    if (!vals.length) return '';
    const sum = vals.reduce((a, b) => a + b, 0);
    const avg = sum / vals.length;
    const isPercent = headers[ci] && /(%|rate|pct|percent)/i.test(headers[ci]);
    const displayVal = isPercent
      ? fmt(avg, true)
      : vals.length === rows.length ? fmt(sum) : fmt(avg);
    const label = isPercent ? 'Avg' : vals.length === rows.length ? 'Total' : 'Avg';
    return `
      <div class="kpi-card">
        <div class="kpi-label">${escHtml(headers[ci])}</div>
        <div class="kpi-value">${displayVal}</div>
        <div class="kpi-sub">${label} · ${vals.length} values</div>
      </div>`;
  });

  grid.innerHTML = cards.join('');
}

// ── Charts ────────────────────────────────
function renderCharts(headers, rows) {
  const grid = document.getElementById('chartGrid');
  // Destroy existing
  Object.values(charts).forEach(c => c.destroy());
  for (const k in charts) delete charts[k];

  if (!headers.length || rows.length < 2) { grid.innerHTML = ''; return; }

  const numericCols = detectNumericCols(headers, rows);
  if (numericCols.length === 0) { grid.innerHTML = ''; return; }

  // Use first text column as label axis, first few numeric as series
  const labelCol = detectLabelCol(headers, rows);
  const labels = rows.slice(0, 30).map(r => r[labelCol] || '');

  const seriesCols = numericCols.filter(c => c !== labelCol).slice(0, 3);
  if (seriesCols.length === 0) { grid.innerHTML = ''; return; }

  const COLORS = ['rgba(79,142,247,0.85)', 'rgba(124,92,252,0.85)', 'rgba(34,197,94,0.85)'];
  const BORDERS = ['#4f8ef7', '#7c5cfc', '#22c55e'];

  // Bar chart for first series
  const chartDivs = seriesCols.map((ci, i) => {
    const id = `chart_${ci}`;
    return `
      <div class="chart-card">
        <h3>${escHtml(headers[ci])}</h3>
        <div class="chart-wrap"><canvas id="${id}"></canvas></div>
      </div>`;
  }).join('');

  grid.innerHTML = chartDivs;

  seriesCols.forEach((ci, i) => {
    const id = `chart_${ci}`;
    const ctx = document.getElementById(id).getContext('2d');
    const vals = rows.slice(0, 30).map(r => parseNum(r[ci]));
    charts[id] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: headers[ci],
          data: vals,
          backgroundColor: COLORS[i % COLORS.length],
          borderColor: BORDERS[i % BORDERS.length],
          borderWidth: 1,
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7b82a0', maxRotation: 45 }, grid: { color: '#2e3250' } },
          y: { ticks: { color: '#7b82a0' }, grid: { color: '#2e3250' } },
        },
      },
    });
  });
}

// ── Table ─────────────────────────────────
function renderTable(headers, rows) {
  if (!headers.length) return;

  document.getElementById('tableCard').style.display = '';
  document.getElementById('tableTitle').textContent =
    `Data  ·  ${rows.length} rows`;

  // Head
  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + headers.map((h, i) =>
    `<th onclick="sortBy(${i})" id="th_${i}">${escHtml(h)}<span class="sort-icon">↕</span></th>`
  ).join('') + '</tr>';

  filteredRows = [...rows];
  currentPage = 1;
  renderTablePage();
}

function renderTablePage() {
  const tbody = document.getElementById('tableBody');
  const headers = allData.headers;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageRows.map(row =>
    '<tr>' + row.map((cell, ci) => {
      const styled = styleCell(cell, headers[ci] || '');
      const isNum = isNumericLike(cell);
      return `<td class="${isNum ? 'num' : ''}">${styled}</td>`;
    }).join('') + '</tr>'
  ).join('');

  renderPagination();
}

function styleCell(val, header) {
  if (val === '' || val === null || val === undefined) return '<span style="color:var(--muted)">—</span>';
  const low = String(val).toLowerCase();

  // Status-like values
  if (/^(yes|true|on|active|done|complete|achieved|pass|ok|good)$/i.test(low))
    return `<span class="chip chip-green">${escHtml(val)}</span>`;
  if (/^(no|false|off|inactive|failed|miss|behind|fail|bad)$/i.test(low))
    return `<span class="chip chip-red">${escHtml(val)}</span>`;
  if (/^(pending|in.?progress|partial|wip|review|hold)$/i.test(low))
    return `<span class="chip chip-yellow">${escHtml(val)}</span>`;
  if (/^(n\/a|n\.a|tbd|unknown)$/i.test(low))
    return `<span class="chip chip-blue">${escHtml(val)}</span>`;

  // URL-like
  if (/^https?:\/\//i.test(val))
    return `<a href="${escHtml(val)}" target="_blank" style="color:var(--accent)">${escHtml(val.length > 40 ? val.slice(0,40)+'…' : val)}</a>`;

  return escHtml(String(val));
}

function renderPagination() {
  const total = filteredRows.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  document.getElementById('paginationInfo').textContent =
    `${start}–${end} of ${total} rows`;

  const btns = document.getElementById('pageBtns');
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹ Prev</button>`;
  for (let p = Math.max(1, currentPage-2); p <= Math.min(pages, currentPage+2); p++) {
    html += `<button class="page-btn ${p===currentPage?'current':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>Next ›</button>`;
  btns.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filteredRows.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTablePage();
}

// ─────────────────────────────────────────────
//  Sort & Filter
// ─────────────────────────────────────────────
function sortBy(ci) {
  if (sortCol === ci) sortAsc = !sortAsc;
  else { sortCol = ci; sortAsc = true; }

  filteredRows.sort((a, b) => {
    const av = a[ci] ?? '', bv = b[ci] ?? '';
    const an = parseNum(av), bn = parseNum(bv);
    const cmp = (!isNaN(an) && !isNaN(bn)) ? an - bn : String(av).localeCompare(String(bv));
    return sortAsc ? cmp : -cmp;
  });

  // Update header icons
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById(`th_${ci}`);
  if (th) {
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortAsc ? ' ↑' : ' ↓';
  }

  currentPage = 1;
  renderTablePage();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredRows = q
    ? allData.rows.filter(row => row.some(c => String(c).toLowerCase().includes(q)))
    : [...allData.rows];
  currentPage = 1;
  renderTablePage();
}

// ─────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────
function detectNumericCols(headers, rows) {
  return headers.map((_, ci) => ci).filter(ci => {
    const sample = rows.slice(0, 20).map(r => r[ci]).filter(v => v !== '' && v !== undefined);
    const numCount = sample.filter(v => !isNaN(parseNum(v))).length;
    return sample.length > 0 && numCount / sample.length > 0.6;
  });
}

function detectLabelCol(headers, rows) {
  // Prefer a column named "name", "label", "category", etc., else first text col
  const preferred = ['name', 'label', 'category', 'item', 'description', 'title', 'metric', 'kpi'];
  for (const p of preferred) {
    const ci = headers.findIndex(h => h && h.toLowerCase().includes(p));
    if (ci >= 0) return ci;
  }
  // First column that is mostly text
  return headers.findIndex((_, ci) => {
    const sample = rows.slice(0, 10).map(r => r[ci]).filter(Boolean);
    return sample.some(v => isNaN(parseNum(v)));
  }) ?? 0;
}

function parseNum(v) {
  if (v === '' || v === null || v === undefined) return NaN;
  const s = String(v).replace(/[$,€£%\s]/g, '');
  return parseFloat(s);
}

function isNumericLike(v) {
  return !isNaN(parseNum(v)) && v !== '';
}

function fmt(n, isPercent = false) {
  if (isNaN(n)) return '—';
  if (isPercent) return n.toFixed(1) + '%';
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n % 1 === 0 ? n.toLocaleString() : n.toFixed(2);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateStatus(left, right) {
  document.getElementById('statusLeft').textContent = left;
  document.getElementById('statusRight').textContent = right;
}

function showError(title, msg) {
  document.getElementById('stateMsg').style.display = '';
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('kpiGrid').innerHTML = '';
  document.getElementById('chartGrid').innerHTML = '';
  document.getElementById('stateMsg').innerHTML = `
    <div class="icon">⚠️</div>
    <h2>${escHtml(title)}</h2>
    <p>${escHtml(msg)}</p>
    <button class="btn" onclick="loadData()">Try Again</button>
  `;
}

function exportCSV() {
  const headers = allData.headers;
  const rows = filteredRows;
  const lines = [headers.join(','), ...rows.map(r =>
    r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))];
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scorecard_export.csv';
  a.click();
}

loadData();
</script>
